name: soul_save
description: Aplikasi celengan digital pribadi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  intl: ^0.20.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.2
  confetti: ^0.7.0
  awesome_notifications: 0.11.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/monefy_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/monefy_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/monefy_icon.png"